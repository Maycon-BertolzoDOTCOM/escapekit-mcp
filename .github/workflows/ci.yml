name: CI & Test Upload

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Job principal: CI (lint, test, build)
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.node-version }}
          path: dist/
          retention-days: 7

      - name: Security audit
        run: npm audit --production
        continue-on-error: true

  # Job separado para upload no Kiwi TCMS (roda apenas no node 20.x para evitar duplicação)
  kiwi-upload:
    name: Upload to Kiwi TCMS
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Upload results to Kiwi TCMS
        env:
          KIWI_URL: ${{ secrets.KIWI_URL }}
          KIWI_USERNAME: ${{ secrets.KIWI_USERNAME }}
          KIWI_PASSWORD: ${{ secrets.KIWI_PASSWORD }}
          KIWI_PRODUCT_ID: ${{ secrets.KIWI_PRODUCT_ID || '1' }}
          KIWI_TEST_PLAN_ID: ${{ secrets.KIWI_TEST_PLAN_ID || '1' }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          echo "📊 Uploading test results to Kiwi TCMS..."
          echo "   Run ID: $GITHUB_RUN_ID"
          echo "   Run Number: $GITHUB_RUN_NUMBER"
          echo "   Commit: $GITHUB_SHA"
          echo "   Branch: $GITHUB_REF"
          
          if [ -f "vitest-results.json" ]; then
            echo "✓ Found vitest-results.json"
            npx tsx scripts/kiwi-upload-enhanced.mts \
              --file vitest-results.json \
              --framework vitest \
              --product-id $KIWI_PRODUCT_ID \
              --test-plan-id $KIWI_TEST_PLAN_ID \
              --verbose
          else
            echo "⚠️  vitest-results.json not found"
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: |
            vitest-results.json
            coverage/
          retention-days: 30
