source:
  title: "Typosquatting in Package Repositories: A Large-Scale Study"
  authors: "Vu et al."
  year: 2024
  doi: "10.1109/SP54263.2024.00123"

facts:
  - id: "F001"
    statement: "Typosquatting attacks exploit small edit-distance variations in package names to distribute malicious code."
    type: "empirical"
    relevance: "Motivates detection of packages with names similar to popular ones."
  - id: "F002"
    statement: "Over 10,000 typosquatting packages were identified in npm over a 3-year period."
    type: "empirical"
    relevance: "Establishes the scale of the threat in the npm ecosystem."
  - id: "F003"
    statement: "Edit distance ≤ 2 captures 94% of known typosquatting cases."
    type: "empirical"
    relevance: "Provides a concrete threshold for the SlopsquatDetector similarity check."

rules:
  - id: "R001"
    principle: "Detect packages with names similar to popular packages using edit distance"
    derived_from: ["F001", "F003"]
    action: "implement_detector"
    detector_name: "SlopsquatDetector"
    paperRef: "IEEE-SP-2024"
    priority: "high"
  - id: "R002"
    principle: "Flag packages with edit distance ≤ 2 from top-1000 npm packages"
    derived_from: ["F002", "F003"]
    action: "implement_threshold"
    detector_name: "SlopsquatDetector"
    paperRef: "IEEE-SP-2024"
    priority: "high"

traceability:
  R001:
    implementation: "src/security/SlopsquatDetector.ts"
    tests: "tests/security/SlopsquatDetector.test.ts"
    status: "implemented"
  R002:
    implementation: "src/security/SlopsquatDetector.ts"
    tests: "tests/security/SlopsquatDetector.test.ts"
    status: "implemented"
  F001:
